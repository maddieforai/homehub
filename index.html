<title>Home Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f6f3; --surface:#fff; --surface2:#f2efeb; --surface3:#e8e3dc;
  --accent:#6b4f35; --accent-lt:#f0e6d8; --accent2:#a97c52;
  --text:#1c1814; --muted:#7a7068; --dim:#b0a89e; --border:#e2ddd6;
  --green:#2e7d52; --green-bg:#eaf5ee;
  --amber:#a05f0a; --amber-bg:#fdf0e0;
  --red:#b83040;   --red-bg:#fcedef;
  --blue:#2558a0;  --blue-bg:#e8f0fb;
  --teal:#1e7a6a;  --teal-bg:#e8f5f2;
  --rose:#9a3060;  --rose-bg:#faedf4;
  --shadow:0 2px 10px rgba(0,0,0,.06);
  --r:14px; --rsm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:16px;}

/* LOGIN */
#loginScreen{position:fixed;top:0;right:0;bottom:0;left:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:var(--bg);padding:40px 28px 28px;overflow-y:auto;}
.logo{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:400;color:var(--accent);letter-spacing:5px;text-transform:uppercase;margin-bottom:4px;margin-top:auto;}
.tagline{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
.divider{width:36px;height:1px;background:var(--accent2);opacity:.4;margin:0 auto 24px;}
.user-select{width:100%;max-width:300px;margin-bottom:20px;}
.user-select label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:10px;}
.user-btns{display:flex;gap:8px;}
.ubtn{flex:1;padding:12px 6px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;}
.ubtn.active{background:var(--accent-lt);border-color:var(--accent2);color:var(--accent);font-weight:500;}
.pin-wrap{width:100%;max-width:300px;margin-bottom:auto;}
.pin-wrap label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:12px;text-align:center;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:20px;}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--dim);transition:all .18s;}
.dot.on{background:var(--accent);border-color:var(--accent);transform:scale(1.1);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.key{aspect-ratio:1;min-height:58px;background:var(--surface);border:1.5px solid var(--border);border-radius:50%;color:var(--text);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .15s;}
.key:active{background:var(--accent-lt);transform:scale(.94);}
.key.del{font-size:16px;color:var(--muted);}
.key.blank{background:transparent;border-color:transparent;box-shadow:none;cursor:default;}
.pin-err{text-align:center;color:var(--red);font-size:13px;margin-top:14px;min-height:18px;}

/* APP */
#app{display:none;padding-bottom:86px;}
.app-header{padding:54px 24px 14px;display:flex;align-items:flex-end;justify-content:space-between;background:var(--bg);}
.hdate{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.htitle{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--text);}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-lt);border:1.5px solid var(--accent2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);font-weight:500;cursor:pointer;flex-shrink:0;}

.chipbar{display:flex;gap:8px;padding:10px 24px 18px;overflow-x:auto;scrollbar-width:none;}
.chipbar::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 13px;border-radius:100px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;border:1px solid;}
.c-red{background:var(--red-bg);color:var(--red);border-color:rgba(184,48,64,.2);}
.c-amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(160,95,10,.2);}
.c-green{background:var(--green-bg);color:var(--green);border-color:rgba(46,125,82,.2);}

/* TOGGLE TABS */
.tab-row{display:flex;gap:0;margin:0 24px 16px;background:var(--surface2);border-radius:var(--rsm);padding:3px;border:1px solid var(--border);}
.tab{flex:1;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1);}

.sec{padding:0 24px 8px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-ttl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:500;}

/* TASK CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;}
.card:active{transform:scale(.99);}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.card.ok::before{background:var(--green);}
.card.soon::before{background:var(--amber);}
.card.over::before{background:var(--red);}
.card.all-ok::before{background:var(--border);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.tname{font-size:16px;font-weight:500;color:var(--text);margin-bottom:2px;line-height:1.3;}
.tmeta{font-size:12px;color:var(--muted);}
.badge{font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:100px;font-weight:500;flex-shrink:0;margin-left:8px;}
.b-household{background:var(--blue-bg);color:var(--blue);}
.b-food{background:var(--teal-bg);color:var(--teal);}
.b-car{background:var(--amber-bg);color:var(--amber);}
.b-health{background:var(--green-bg);color:var(--green);}
.b-admin{background:var(--rose-bg);color:var(--rose);}
.prog{height:3px;background:var(--surface2);border-radius:2px;margin:8px 0;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.pf-ok{background:var(--green);}.pf-soon{background:var(--amber);}.pf-over{background:var(--red);}.pf-all-ok{background:var(--dim);}
.card-bot{display:flex;align-items:center;justify-content:space-between;}
.due{font-size:12px;display:flex;align-items:center;gap:4px;}
.d-ok{color:var(--green);}.d-soon{color:var(--amber);}.d-over{color:var(--red);}.d-all-ok{color:var(--dim);}
.acts{display:flex;gap:6px;}
.tbtn{padding:6px 12px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;font-family:'DM Sans',sans-serif;transition:opacity .15s;}
.tbtn:active{opacity:.7;}
.btn-done{background:var(--green-bg);color:var(--green);border-color:rgba(46,125,82,.25);}
.btn-lnk{background:var(--accent-lt);color:var(--accent);border-color:rgba(107,79,53,.2);text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.btn-edit{background:var(--surface2);color:var(--muted);border-color:var(--border);}
.assignee-row{font-size:11px;color:var(--dim);margin-top:8px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.a-pill{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:2px 8px;font-size:11px;color:var(--muted);}

/* ALL TASKS — schedule summary line */
.sched-line{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px;}
.sched-line .sl-next{color:var(--text);font-weight:500;}

/* FAB */
.fab{position:fixed;bottom:94px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 4px 18px rgba(107,79,53,.38);transition:transform .2s;z-index:50;}
.fab:active{transform:scale(.91);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:74px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:40;box-shadow:0 -3px 16px rgba(0,0,0,.06);}
.nitem{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 18px;color:var(--dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500;transition:color .2s;}
.nitem.active{color:var(--accent);}
.nitem svg{width:22px;height:22px;}

/* MODAL */
.overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(28,24,20,.32);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 24px 48px;animation:up .3s cubic-bezier(.34,1.4,.64,1);}
@keyframes up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:0 auto 20px;}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--text);margin-bottom:22px;}

/* FORM */
.fg{margin-bottom:15px;}
.fl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px;font-weight:500;}
.fi,.fs,.fta{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent2);background:var(--surface);}
.fs option{background:var(--surface);}
.fta{resize:none;height:76px;}
.frow{display:flex;gap:12px;}.frow .fg{flex:1;}

/* MULTI-ASSIGN CHECKBOXES */
.assign-boxes{display:flex;gap:8px;flex-wrap:wrap;}
.abox{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 14px;cursor:pointer;transition:all .15s;flex:1;min-width:80px;}
.abox.checked{background:var(--accent-lt);border-color:var(--accent2);}
.abox input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.abox span{font-size:14px;color:var(--text);}
.abox.checked span{color:var(--accent);font-weight:500;}

/* BUTTONS */
.btnp{width:100%;padding:15px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:var(--rsm);cursor:pointer;margin-top:8px;}
.btnp:active{opacity:.85;}
.btns{width:100%;padding:13px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;border:1.5px solid var(--border);border-radius:var(--rsm);cursor:pointer;margin-top:8px;}

/* HISTORY */
.hentry{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.hdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.htxt{font-size:14px;color:var(--muted);flex:1;}
.hdate{font-size:12px;color:var(--dim);flex-shrink:0;}

/* SETTINGS */
.ssec{margin-bottom:26px;}
.sttl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:500;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.srow{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.srow:last-child{border-bottom:none;}
.srlbl{font-size:15px;color:var(--text);}
.srval{font-size:13px;color:var(--muted);}
.prow{padding:14px 16px;border-bottom:1px solid var(--border);}
.prow:last-child{border-bottom:none;}
.pname{font-size:14px;color:var(--text);margin-bottom:9px;font-weight:500;}
.pchips{display:flex;flex-wrap:wrap;gap:6px;}
.pchip{padding:5px 12px;border-radius:100px;font-size:11px;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:var(--surface2);transition:all .15px;font-weight:500;}
.pchip.on{background:var(--accent-lt);border-color:var(--accent2);color:var(--accent);}

/* DETAIL */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dcell{background:var(--surface2);border-radius:var(--rsm);padding:12px 14px;}
.dclbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:500;}
.dcval{font-size:15px;color:var(--text);}

/* EMPTY */
.empty{text-align:center;padding:52px 24px;color:var(--muted);}
.empty-ico{font-size:44px;margin-bottom:12px;}
.empty-txt{font-size:15px;line-height:1.6;}

/* NOTIF */
.notif{position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:52px 20px 13px;z-index:300;display:none;align-items:center;gap:12px;box-shadow:var(--shadow);animation:dn .3s ease;}
@keyframes dn{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.ntxt{flex:1;font-size:14px;color:var(--text);}

function kdel(){pin=pin.slice(0,-1); dots(); document.getElementById('pinErr').textContent='';}

  document.getElementById('pinSection').style.display = isAdmin ? 'block' : 'none';
  /* Nati cannot add or edit tasks */
  document.querySelector('.fab').style.display = S.user === 'Nati' ? 'none' : 'flex';
  render(); renderHist(); renderPerms();
  setTimeout(checkDue,900);
}

/* ── DATE HELPERS ── */
function parseDate(ds){
  // Parse YYYY-MM-DD safely without timezone shifting on mobile
  if(!ds)return new Date();
  var parts=ds.split('-');
  return new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
}
function addDate(ds,n,u){
  var d=parseDate(ds);
  if(u==='days')d.setDate(d.getDate()+n);
  else if(u==='weeks')d.setDate(d.getDate()+n*7);
  else if(u==='months')d.setMonth(d.getMonth()+n);
  return d;
}
function daysUntil(ds){
  var t=new Date();t.setHours(0,0,0,0);
  var d=parseDate(ds);d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function dueDate(t){
  return t.type==='oneoff'?parseDate(t.dueDate||t.due):addDate(t.last,t.int,t.unit);
}
function fmtDateObj(d){
  return d.toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});
}
function fmtDateObjShort(d){
  return d.toLocaleDateString('en-SG',{day:'numeric',month:'short'});
}
function status(t){
  var dd=dueDate(t);
  var ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
  var d=daysUntil(ds);
  if(d<0)return'over';
  if(d<=(t.remind||14))return'soon';
  return'ok';
}
function progress(t){
  if(t.type==='oneoff'){
    var dd=dueDate(t);
    var ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
    var d=daysUntil(ds);
    return Math.max(0,Math.min(100,100-(d/Math.max(t.remind||7,1)*100)));
  }
  var tot=t.unit==='months'?t.int*30.5:t.unit==='weeks'?t.int*7:t.int;
  return Math.max(0,Math.min(100,((new Date()-parseDate(t.last))/86400000/tot)*100));
}
function fmtDue(t){
  var due=dueDate(t);
  var ds=due.getFullYear()+'-'+String(due.getMonth()+1).padStart(2,'0')+'-'+String(due.getDate()).padStart(2,'0');
  var d=daysUntil(ds);
  if(d<0)return Math.abs(d)+'d overdue';
  if(d===0)return'Due today';
  if(d===1)return'Due tomorrow';
  if(d<=60)return'In '+d+' days';
  return fmtDateObj(due);
}
function fmtDate(ds){
  return fmtDateObj(parseDate(ds));
}

/* Schedule summary for All Tasks view */
function schedSummary(t){
  var due=dueDate(t);
  var dueFmt=fmtDateObjShort(due);
  var ds=due.getFullYear()+'-'+String(due.getMonth()+1).padStart(2,'0')+'-'+String(due.getDate()).padStart(2,'0');
  var d=daysUntil(ds);
  if(t.type==='oneoff'){
    if(d<0)return'<span style="color:var(--red)">Overdue by '+Math.abs(d)+'d</span>';
    return'Due <span class="sl-next">'+dueFmt+'</span>';
  }
  var freq='every '+t.int+' '+t.unit;
  if(d<0)return'<span style="color:var(--red)">Overdue '+Math.abs(d)+'d</span> · <span style="color:var(--dim)">'+freq+'</span>';
  return'Next <span class="sl-next">'+dueFmt+'</span> · <span style="color:var(--dim)">'+freq+'</span>';
}

function assignLabel(t){
  const a=t.assign||[];
  if(!a.length)return'Unassigned';
  if(a.length===PEOPLE.length)return'Everyone';
  return a.join(', ');
}

/* ── TAB SWITCH ── */
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-upcoming').classList.toggle('active',tab==='upcoming');
  document.getElementById('tab-all').classList.toggle('active',tab==='all');
  render();
}

/* ── RENDER ── */
function visible(){
  /* Nati only sees tasks explicitly assigned to her */
  if(S.user === 'Nati'){
    return (S.tasks||[]).filter(function(t){
      return Array.isArray(t.assign) && t.assign.includes('Nati');
    });
  }
  /* Maddie and Justin see tasks in their permitted categories + assigned to them */
  var p=(S.perms&&S.perms[S.user])||Object.keys(CATS);
  return (S.tasks||[]).filter(function(t){
    return p.includes(t.cat) || (Array.isArray(t.assign) && t.assign.includes(S.user));
  });
}

function render(){
  const tasks=visible();
  let ov=0,so=0,ok=0;
  tasks.forEach(t=>{const s=status(t);if(s==='over')ov++;else if(s==='soon')so++;else ok++;});
  document.getElementById('chipbar').innerHTML=
    (ov?`<div class="chip c-red">⚠️ ${ov} Overdue</div>`:'')+
    (so?`<div class="chip c-amber">⏰ ${so} Due Soon</div>`:'')+
    `<div class="chip c-green">✓ ${ok} On Track</div>`;

  const list=document.getElementById('taskList');

  if(!tasks.length){
    list.innerHTML=`<div class="empty"><div class="empty-ico">🏠</div><div class="empty-txt">No reminders yet.<br>Tap <strong>+</strong> to add your first one.</div></div>`;
    return;
  }

  if(currentTab==='upcoming'){
    renderUpcoming(tasks, list);
  } else {
    renderAll(tasks, list);
  }
}

function renderUpcoming(tasks, list){
  const upcoming=tasks.filter(t=>{
    const d=daysUntil(dueDate(t).toISOString().split('T')[0]);
    return d<=14;
  });
  if(!upcoming.length){
    list.innerHTML=`<div class="empty"><div class="empty-ico">✅</div><div class="empty-txt">All clear! Nothing due in the next 14 days.<br><br><span style="font-size:13px;color:var(--accent);cursor:pointer" onclick="switchTab('all')">→ View all ${tasks.length} task${tasks.length!==1?'s':''}</span></div></div>`;
    return;
  }
  const ord={over:0,soon:1,ok:2};
  list.innerHTML=[...upcoming].sort((a,b)=>ord[status(a)]-ord[status(b)]).map(t=>cardHTML(t,false)).join('');
}

function renderAll(tasks, list){
  if(!tasks.length){
    list.innerHTML=`<div class="empty"><div class="empty-ico">🏠</div><div class="empty-txt">No reminders yet.<br>Tap <strong>+</strong> to add your first one.</div></div>`;
    return;
  }
  // Sort by due date ascending (overdue first naturally)
  const sorted=[...tasks].sort((a,b)=>dueDate(a)-dueDate(b));
  list.innerHTML=sorted.map(t=>cardHTML(t,true)).join('');
}

function cardHTML(t, allView){
  const s=status(t);
  // In all view, tasks not due soon get a neutral style
  const cardClass=allView&&s==='ok'?'all-ok':s;
  const pfClass=allView&&s==='ok'?'all-ok':s;
  const cat=CATS[t.cat], p=progress(t);
  const al=assignLabel(t);
  const assignHTML=al==='Everyone'?'':`<div class="assignee-row">👤 ${(t.assign||[]).map(n=>`<span class="a-pill">${n}</span>`).join('')}</div>`;

  let bottomLeft;
  if(allView){
    bottomLeft=`<div class="sched-line">${schedSummary(t)}</div>`;
  } else {
    const ico=s==='over'?'⚠️':s==='soon'?'⏰':'✓';
    bottomLeft=`<div class="due d-${s}">${ico} ${fmtDue(t)}</div>`;
  }

  return`<div class="card ${cardClass}" onclick="showDet('${t.id}')">
    <div class="card-top">
      <div>
        <div class="tname">${t.name}</div>
        <div class="tmeta">${t.type==='recurring'?`Every ${t.int} ${t.unit}`:'One-off'}</div>
      </div>
      <span class="badge ${cat.cls}">${cat.label}</span>
    </div>
    <div class="prog"><div class="prog-fill pf-${pfClass}" style="width:${p}%"></div></div>
    <div class="card-bot">
      ${bottomLeft}
      <div class="acts" onclick="event.stopPropagation()">
        ${t.link?`<a class="tbtn btn-lnk" href="${t.link}" target="_blank">${t.linklbl||'🔗 Link'}</a>`:''}
        <button class="tbtn btn-done" onclick="markDone('${t.id}')">✓ Done</button>
      </div>
    </div>
    ${assignHTML}
  </div>`;
}

/* ── DETAIL ── */
function showDet(id){
  const t=S.tasks.find(x=>x.id===id); if(!t)return;
  const cat=CATS[t.cat], due=dueDate(t);
  document.getElementById('detContent').innerHTML=`
    <div class="handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div class="sheet-title" style="margin-bottom:0">${t.name}</div>
      ${S.user !== 'Nati' ? '<button class="tbtn btn-edit" style="margin-top:6px" onclick="editTask(\'' + t.id + '\');closeM(\'detModal\')">Edit</button>' : ''}
    </div>
    <div style="margin-bottom:18px"><span class="badge ${cat.cls}">${cat.label}</span></div>
    <div class="dgrid">
      <div class="dcell"><div class="dclbl">Type</div><div class="dcval">${t.type==='recurring'?'Every '+t.int+' '+t.unit:'One-off'}</div></div>
      <div class="dcell"><div class="dclbl">Due</div><div class="dcval">${fmtDateObj(due)}</div></div>
      <div class="dcell"><div class="dclbl">Remind</div><div class="dcval">${t.remind||7} days before</div></div>
      <div class="dcell"><div class="dclbl">Assigned</div><div class="dcval">${assignLabel(t)}</div></div>
      ${t.type==='recurring'?'<div class="dcell"><div class="dclbl">Last Done</div><div class="dcval">'+fmtDateObjShort(parseDate(t.last))+'</div></div>':''}
    </div>
    ${t.notes?'<div style="background:var(--surface2);border-radius:var(--rsm);padding:13px;margin-bottom:14px"><div class="dclbl" style="margin-bottom:5px">Notes</div><div style="font-size:14px;color:var(--muted)">'+t.notes+'</div></div>':''}
    ${t.link?'<a class="tbtn btn-lnk" href="'+t.link+'" target="_blank" style="display:flex;justify-content:center;padding:13px;border-radius:var(--rsm);font-size:14px;margin-bottom:14px">'+(t.linklbl||'🔗 Open Link')+'</a>':''}
    <div style="margin-bottom:18px">
      <div class="sec-ttl" style="margin-bottom:10px">Completion History</div>
      ${(t.hist||[]).slice().reverse().map(function(h){return'<div class="hentry"><div class="hdot"></div><div class="htxt">Done by <strong>'+h.by+'</strong></div><div class="hdate">'+fmtDateObj(parseDate(h.date))+'</div></div>';}).join('')||'<div style="color:var(--dim);font-size:14px;padding:8px 0">No history yet.</div>'}
    </div>
    <button class="btnp" onclick="markDone('${t.id}');closeM('detModal')">✓ Mark as Done Today</button>
    <button class="btns" onclick="closeM('detModal')">Close</button>`;
  document.getElementById('detModal').classList.add('open');
}

/* ── MARK DONE ── */
function markDone(id){
  const t=S.tasks.find(x=>x.id===id); if(!t)return;
  const today=new Date().toISOString().split('T')[0];
  if(t.type==='recurring')t.last=today;
  if(!t.hist)t.hist=[];
  t.hist.push({date:today,by:S.user});
  S.log.unshift({date:today,task:t.name,by:S.user});
  save(); render(); renderHist();
  toast(`✅ "${t.name}" marked as done!`);
}

/* ── HISTORY ── */
function renderHist(){
  const list=document.getElementById('histList');
  if(!S.log.length){list.innerHTML=`<div class="empty"><div class="empty-ico">📜</div><div class="empty-txt">No completions yet.</div></div>`;return;}
  list.innerHTML=S.log.map(function(h){return'<div class="hentry"><div class="hdot"></div><div class="htxt"><strong>'+h.task+'</strong> — '+h.by+'</div><div class="hdate">'+fmtDateObjShort(parseDate(h.date))+'</div></div>';}).join('');
}

/* ── ADD / EDIT ── */
function syncAbox(cb){
  const lbl=document.getElementById('abox-'+cb.value);
  if(lbl)lbl.classList.toggle('checked',cb.checked);
}
function setAssign(arr){
  PEOPLE.forEach(p=>{
    const cb=document.querySelector(`#abox-${p} input`);
    const lbl=document.getElementById('abox-'+p);
    if(cb){cb.checked=arr.includes(p); lbl.classList.toggle('checked',cb.checked);}
  });
}
function getAssign(){
  return PEOPLE.filter(p=>{const cb=document.querySelector(`#abox-${p} input`);return cb&&cb.checked;});
}

function showAdd(){
  editId=null;
  document.getElementById('addTitle').textContent='New Reminder';
  document.getElementById('delBtn').style.display='none';
  ['tName','tLink','tLinkLbl','tNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tCat').value='household';
  document.getElementById('tType').value='recurring';
  document.getElementById('tInt').value=3;
  document.getElementById('tUnit').value='months';
  document.getElementById('tLast').value=new Date().toISOString().split('T')[0];
  document.getElementById('tRem').value=14;
  document.getElementById('tDue').value='';
  document.getElementById('tRemOne').value=7;
  setAssign(['Maddie','Justin','Nati']);
  toggleType();
  document.getElementById('addModal').classList.add('open');
}

function editTask(id){
  const t=S.tasks.find(x=>x.id===id); if(!t)return;
  editId=id;
  document.getElementById('addTitle').textContent='Edit Reminder';
  document.getElementById('delBtn').style.display='block';
  document.getElementById('tName').value=t.name;
  document.getElementById('tCat').value=t.cat;
  document.getElementById('tType').value=t.type;
  document.getElementById('tInt').value=t.int||3;
  document.getElementById('tUnit').value=t.unit||'months';
  document.getElementById('tLast').value=t.last||'';
  document.getElementById('tRem').value=t.remind||14;
  document.getElementById('tDue').value=t.dueDate||t.due||'';
  document.getElementById('tRemOne').value=t.remind||7;
  document.getElementById('tLink').value=t.link||'';
  document.getElementById('tLinkLbl').value=t.linklbl||'';
  document.getElementById('tNotes').value=t.notes||'';
  setAssign(Array.isArray(t.assign)?t.assign:(t.assign&&t.assign!=='All'?[t.assign]:PEOPLE));
  toggleType();
  document.getElementById('addModal').classList.add('open');
}

function toggleType(){
  const r=document.getElementById('tType').value==='recurring';
  document.getElementById('recFields').style.display=r?'block':'none';
  document.getElementById('oneFields').style.display=r?'none':'block';
}

function saveTask(){
  try {
    const name=document.getElementById('tName').value.trim();
    if(!name){alert('Please enter a task name.');return;}
    const type=document.getElementById('tType').value;
    const assign=getAssign();
    if(!assign.length){alert('Please assign to at least one person.');return;}
    const today=new Date().toISOString().split('T')[0];
    const ex=editId?S.tasks.find(function(x){return x.id===editId;}):null;
    const task={
      id:editId||'t'+Date.now(), name,
      cat:document.getElementById('tCat').value,
      type:type, assign:assign,
      link:document.getElementById('tLink').value.trim(),
      linklbl:document.getElementById('tLinkLbl').value.trim(),
      notes:document.getElementById('tNotes').value.trim(),
      hist:(ex&&ex.hist)?ex.hist:[]
    };
    if(type==='recurring'){
      task.int=parseInt(document.getElementById('tInt').value)||3;
      task.unit=document.getElementById('tUnit').value;
      task.last=document.getElementById('tLast').value||today;
      task.remind=parseInt(document.getElementById('tRem').value)||14;
    } else {
      task.dueDate=document.getElementById('tDue').value||today;
      task.remind=parseInt(document.getElementById('tRemOne').value)||7;
    }
    if(!S.tasks)S.tasks=[];
    if(editId){
      var i=S.tasks.findIndex(function(x){return x.id===editId;});
      if(i>-1)S.tasks[i]=task; else S.tasks.push(task);
    } else {
      S.tasks.push(task);
    }
    save(); render(); renderHist(); closeM('addModal');
  } catch(e) {
    alert('Could not save: '+e.message);
  }
}

function delTask(){
  if(!editId||!confirm('Delete this reminder?'))return;
  S.tasks=S.tasks.filter(x=>x.id!==editId);
  save(); render(); closeM('addModal');
}

/* ── PERMISSIONS ── */
function renderPerms(){
  document.getElementById('permPanel').innerHTML=PEOPLE.map(u=>{
    const p=S.perms[u]||[];
    return`<div class="prow"><div class="pname">${u}</div><div class="pchips">${Object.entries(CATS).map(([k,c])=>`<div class="pchip ${p.includes(k)?'on':''}" onclick="togPerm('${u}','${k}',this)">${c.label}</div>`).join('')}</div></div>`;
  }).join('');
}
function togPerm(u,cat,el){
  const p=S.perms[u]||[]; const i=p.indexOf(cat);
  if(i>-1)p.splice(i,1);else p.push(cat);
  S.perms[u]=p; el.classList.toggle('on');
  save(); if(u===S.user)render();
}

/* ── NOTIFICATIONS ── */
function checkDue(){
  const tasks=visible();
  const ov=tasks.filter(t=>status(t)==='over');
  const so=tasks.filter(t=>status(t)==='soon');
  if(ov.length)toast(`⚠️ ${ov.map(t=>t.name).join(', ')} ${ov.length===1?'is':'are'} overdue!`);
  else if(so.length)toast(`⏰ ${so.map(t=>t.name).join(', ')} due soon!`);
}

function toast(msg){
  const b=document.getElementById('notif');
  document.getElementById('ntxt').textContent=msg;
  b.style.display='flex';
  clearTimeout(window._nt);
  window._nt=setTimeout(()=>b.style.display='none',5000);
  if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
    try{new Notification('Home Hub',{body:msg});}catch(e){}
  }
}
function closeNotif(){document.getElementById('notif').style.display='none';}

/* ── PIN ── */
function showPinModal(){document.getElementById('newPin').value='';document.getElementById('pinModal').classList.add('open');}
function savePin(){
  const np=String(document.getElementById('newPin').value).trim();
  if(np.length!==4||isNaN(np)){alert('Please enter exactly 4 digits.');return;}
  S.pin=np; save(); closeM('pinModal'); toast('🔒 PIN updated.');
}

/* ── NAV ── */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('active'));
  document.getElementById(name+'View').classList.add('active');
  const nav=document.getElementById('nav-'+name);
  if(nav)nav.classList.add('active');
}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

/* ── STARTUP ── */
loadUser();
/* Show loading state while Firebase connects */
document.getElementById('loginScreen').innerHTML += '';
startSync();
</script>
</body>
</html>
